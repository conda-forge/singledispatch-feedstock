{% set version = "3.6.1" %}

package:
  name: singledispatch
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/s/singledispatch/singledispatch-{{ version }}.tar.gz
  sha256: 58b46ce1cc4d43af0aac3ac9a047bdb0f44e05f0b2fa2eec755863331700c865

build:
  noarch: python
  number: 1
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - six

test:
  requires:
    - python {{ python_min }}
  imports:
    - singledispatch

about:
  home: http://docs.python.org/3/library/functools.html#functools.singledispatch
  license: MIT
  license_file: LICENSE
  summary: This library brings functools.singledispatch from Python 3.4 to Python 2.6-3.3.

extra:
  recipe-maintainers:
    - jakirkham
